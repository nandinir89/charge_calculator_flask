<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Furnace Charge Report</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: Arial, Helvetica, sans-serif; font-size: 10pt; color: #000; background: #e8e8e8; }

.toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: #1a1d23; color: #fff;
  padding: 8px 18px; display: flex; align-items: center; gap: 10px; font-size: 13px;
}
.toolbar button { padding: 5px 13px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
.btn-back  { background: #4b5563; color: #fff; }
.btn-print { background: #1a56db; color: #fff; }
.lbl       { font-weight: 600; }
.tright    { margin-left: auto; }

.wrapper { margin-top: 48px; padding: 16px; }

/* A4 page */
.page {
  width: 210mm; min-height: 297mm;
  margin: 0 auto 16px; padding: 9mm 10mm 14mm;
  background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.18);
  position: relative; overflow: visible;
}

/* Dark section title */
.stitle {
  background: #1a1d23; color: #fff;
  padding: 3px 7px; font-size: 7.5pt; font-weight: 700;
  text-transform: uppercase; letter-spacing: .05em;
}

/* ── Page header ─────────────────────────────────── */
.ph { display: grid; grid-template-columns: 1fr 165px; border: 2px solid #000; margin-bottom: 3px; }
.ph-l { padding: 5px 8px; border-right: 1px solid #000; }
.ph-title { font-size: 13pt; font-weight: 700; }
.ph-sub   { font-size: 7.5pt; color: #555; margin-top: 1px; }
.ph-r { padding: 4px 8px; }
.mrow { display: flex; font-size: 7.5pt; margin-bottom: 2px; }
.mlbl { font-weight: 700; color: #666; min-width: 55px; }
.mval { border-bottom: 1px solid #aaa; flex: 1; padding-left: 3px; }

/* ── Info bar ────────────────────────────────────── */
.ibar { display: grid; grid-template-columns: repeat(6,1fr); border: 1px solid #000; border-top: none; margin-bottom: 3px; }
.ic { padding: 3px 5px; border-right: 1px solid #ccc; }
.ic:last-child { border-right: none; }
.ic-l { font-size: 6pt; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 1px; }
.ic-v { font-size: 8pt; }

/* ── Per-tap bar ─────────────────────────────────── */
.tapbar { border: 1px solid #000; border-top: none; margin-bottom: 3px; display: grid; }
.tapbar.t2 { grid-template-columns: repeat(6,1fr); }
.tapbar.t3 { grid-template-columns: repeat(9,1fr); }
.tbc { padding: 3px 5px; border-right: 1px solid #ccc; font-size: 8pt; }
.tbc:last-child { border-right: none; }
.tbl { font-size: 6pt; font-weight: 700; color: #666; text-transform: uppercase; }

/* ── Chemistry block ─────────────────────────────── */
.chem-wrap { border: 1px solid #000; margin-bottom: 3px; }
.ctbl { width: 100%; border-collapse: collapse; font-size: 8pt; }
.ctbl th { background: #e8e8e8; padding: 2px 4px; border: 1px solid #bbb; text-align: center; font-weight: 700; font-size: 7pt; }
.ctbl th.lh { text-align: left; width: 95px; }
.ctbl td { padding: 2px 4px; border: 1px solid #ddd; text-align: center; }
.ctbl td.lh { text-align: left; font-weight: 700; background: #f5f5f5; font-size: 7.5pt; }
.ok   { color: #0e7a52; font-weight: 700; }
.low  { color: #92580a; font-weight: 700; }
.high { color: #b91c1c; font-weight: 700; }

/* ── Two columns (left=charge tables, right=ops) ─── */
/* NOTE: ladle additions go BELOW this, full-width   */
.cols { display: grid; grid-template-columns: 52% 1fr; gap: 5px; margin-bottom: 3px; align-items: start; }

/* ── Generic bordered table ──────────────────────── */
.tbox { border: 1px solid #000; margin-bottom: 3px; }
.gtbl { width: 100%; border-collapse: collapse; font-size: 8pt; }
.gtbl th { background: #e8e8e8; padding: 2px 5px; border: 1px solid #bbb; text-align: left; font-weight: 700; font-size: 7pt; }
.gtbl th.r { text-align: right; }
.gtbl td { padding: 2px 5px; border: 1px solid #e8e8e8; }
.gtbl td.r { text-align: right; }
.gtbl tr.sub  td { border-top: 1.5px solid #666; font-weight: 700; background: #f0f0f0; }
.gtbl tr.gttl td { border-top: 2px solid #000; background: #1a1d23; color: #fff; font-weight: 700; font-size: 8.5pt; padding: 4px 6px; }

/* ── Ops grid ────────────────────────────────────── */
.ops-box { border: 1px solid #000; margin-bottom: 3px; }
.ogrid { display: grid; grid-template-columns: 1fr 1fr; }
.oc { padding: 3px 5px; border-right: 1px solid #ccc; border-bottom: 1px solid #e0e0e0; }
.oc:nth-child(even) { border-right: none; }
.oc.full { grid-column: 1/-1; border-right: none; }
.ol { font-size: 6pt; font-weight: 700; color: #666; text-transform: uppercase; margin-bottom: 1px; }
.ov { border-bottom: 1px solid #aaa; min-height: 13px; padding-left: 2px; font-size: 8.5pt; }

/* ── Ladle additions — full width below cols ─────── */
.ladle-section { border: 1px solid #000; margin-bottom: 3px; }
/* single tap: normal table inside */
/* multi-tap: grid of per-tap boxes */
.ladle-grid { display: grid; gap: 0; }
.ladle-grid.t2 { grid-template-columns: 1fr 1fr; }
.ladle-grid.t3 { grid-template-columns: 1fr 1fr 1fr; }
.ladle-tap-box { border-right: 1px solid #ccc; }
.ladle-tap-box:last-child { border-right: none; }
.ladle-tap-hdr {
  background: #374151; color: #fff;
  padding: 2px 6px; font-size: 7pt; font-weight: 700;
  text-transform: uppercase; letter-spacing: .03em;
}
/* shared ladle table styles */
.ltbl { width: 100%; border-collapse: collapse; font-size: 7.5pt; }
.ltbl th { background: #f0f0f0; padding: 2px 4px; border-bottom: 1px solid #bbb; text-align: left; font-weight: 700; font-size: 6.5pt; }
.ltbl th.r { text-align: right; }
.ltbl td { padding: 2px 4px; border-bottom: 1px solid #eee; }
.ltbl td.r { text-align: right; }
.loc-f { color: #92400e; font-weight: 700; font-size: 6.5pt; }
.loc-l { color: #1a56db; font-weight: 700; font-size: 6.5pt; }

/* ── Former notes ────────────────────────────────── */
.fgrid { display: grid; grid-template-columns: 1fr 1fr; font-size: 7.5pt; }
.fc { padding: 3px 7px; border-right: 1px solid #ddd; border-bottom: 1px solid #ddd; }
.fc.full { grid-column: 1/-1; border-right: none; border-bottom: none; }

/* ── Footer ──────────────────────────────────────── */
.pfooter {
  position: absolute; bottom: 4mm; left: 10mm; right: 10mm;
  display: flex; justify-content: space-between;
  font-size: 6.5pt; color: #999;
  border-top: 1px solid #ddd; padding-top: 2px;
}

@media print {
  html, body { background: #fff; }
  .toolbar { display: none !important; }
  .wrapper { margin-top: 0 !important; padding: 0 !important; }
  .page { box-shadow: none !important; margin: 0 !important; page-break-after: always; }
  .page:last-child { page-break-after: avoid; }
  @page { size: A4 portrait; margin: 0; }
}
</style>
</head>
<body>

<div class="toolbar">
  <button class="btn-back" onclick="history.back()">← Back</button>
  <span class="lbl" id="rpt-lbl">Furnace Charge Report</span>
  <div class="tright">
    <button class="btn-print" onclick="window.print()">🖨&nbsp; Print / Save PDF</button>
  </div>
</div>

<div class="wrapper">
  <div id="pages"><p style="padding:40px;color:#aaa;text-align:center">Loading report…</p></div>
</div>

<script>
const D    = {"aim_chemistry": {"C": 0.2, "Cr": 0.0, "Cu": 0.0, "Mn": 1.0, "Mo": 0.0, "Ni": 0.0, "P": 0.0, "S": 0.0, "Si": 0.4}, "alloy_additions": [{"code": "GRAF", "description": "FA1300 - Carbon", "planned": 1.41, "total": 1.41, "trim": 0.0}, {"code": "FESI", "description": "FA1070 - FeSi", "planned": 6.98, "total": 6.98, "trim": 0.0}, {"code": "HCMN", "description": "FA1010 - H.C. Fe-Mn", "planned": 16.54, "total": 16.54, "trim": 0.0}], "charge_rows": [{"actual": 0, "code": "047", "description": "WCC", "planned": 2500.0, "total": 2500.0}, {"actual": 0, "code": "FS1025", "description": "Mild Steel Bales", "planned": 2200.0, "total": 2200.0}, {"actual": 0, "code": "FS1010", "description": "Punchings", "planned": 200.0, "total": 200.0}], "comparison": {"C": {"actual": 0.2228, "aim": 0.2, "status": "ok"}, "Cr": {"actual": 0.0009, "aim": 0, "status": "ok"}, "Cu": {"actual": 0.0012, "aim": 0, "status": "ok"}, "Mn": {"actual": 1.0001, "aim": 1.0, "status": "ok"}, "Mo": {"actual": 0.0001, "aim": 0, "status": "ok"}, "Ni": {"actual": 0.0008, "aim": 0, "status": "ok"}, "P": {"actual": 0.01, "aim": 0, "status": "ok"}, "S": {"actual": 0.0073, "aim": 0, "status": "ok"}, "Si": {"actual": 0.4011, "aim": 0.4, "status": "ok"}}, "grade": {"Al": 0.0, "Al_deox": 0.0, "Al_ladle": 0.0, "Al_ladle2": 0.0, "Barinoc": 0.0, "C": 0.2, "CaSiMn": 0.0, "Cr": 0.0, "Cu": 0.0, "FeB": 0.0, "FeSe": 0.0, "FeSiZr": 0.0, "FeTi": 0.0, "FeTi2": 0.0, "Hypercal": 0.0, "MgFeSi": 0.0, "Mn": 1.0, "Mo": 0.0, "Ni": 0.0, "P": 0.0, "S": 0.0, "Si": 0.4, "Superseed": 0.0, "V": 0.0, "code": "047", "description": "WCC"}, "grade_code": "047", "grade_description": "WCC", "heat_info": {"argon_purging": true, "furnace_no": "F1", "heat_no": "H5682", "ladle": "BP1", "melt_date": "2026-04-13", "mpn": "", "operator": "SD", "pour_temp": 1580.0, "tap_temp_calc": 1630.0}, "ladle_additions": [], "n_taps": 1, "planned_chemistry": {"C": 0.2228, "Cr": 0.0009, "Cu": 0.0012, "Mn": 1.0001, "Mo": 0.0001, "Ni": 0.0008, "P": 0.01, "S": 0.0073, "Si": 0.4011}, "tap_splits": [{"ladle": "BP1", "temp": 1550, "weight": 5000}], "tap_type": "Single Tap", "tap_weight": 5000.0, "total_add_kg": 24.93, "total_charge_kg": 4900.0, "total_combined_kg": 4924.93, "total_tonnes": 5.0};
const CHEM = ['C','Si','Mn','Cr','Ni','Mo','Cu','P'];

window.addEventListener('load', () => {
  if (!D) {
    document.getElementById('pages').innerHTML =
      '<div style="padding:40px;color:red">No report data. Open from the Calculator page.</div>';
    return;
  }
  if (D._saved_file) {
    const note = document.createElement('div');
    note.style.cssText = 'background:#d1fae5;color:#065f46;padding:6px 14px;font-size:12px;text-align:center;border-bottom:1px solid #86efac';
    note.textContent = '💾 Saved to: ' + D._saved_file;
    document.body.insertBefore(note, document.body.firstChild);
  }
  if (D.report_type === 'trim') {
    document.getElementById('rpt-lbl').textContent =
      'Trim Report — ' + D.grade_description + ' (' + D.grade_code + ')';
    renderTrim();
  } else {
    document.getElementById('rpt-lbl').textContent =
      D.grade_description + ' (' + D.grade_code + ') — ' + tapLabel();
    render();
  }
});

function tapLabel() {
  return {1:'Single Tap', 2:'Double Tap', 3:'Triple Tap'}[D.n_taps] || 'Single Tap';
}

// In UI: user enters "Pour Temperature"
// In report: "Pour Temp" = user entry, "Tap Temp" = pour - 50
function tapFromPour(p) {
  const n = parseFloat(p);
  return isNaN(n) ? '' : (n + 50);
}
// Keep pourTemp as identity for per-tap display
function pourTemp(t) {
  return parseFloat(t) || '';
}

function fmtC(v) {
  const n = parseFloat(v);
  if (!n && n !== 0) return '—';
  return n === 0 ? '—' : (n < 1 ? n.toFixed(3) : n.toFixed(2));
}

function render() {
  const hi = D.heat_info || {};
  const tl = tapLabel();
  const sp = D.tap_splits || [];
  let html = `<div class="page">`;

  /* ── PAGE HEADER ────────────────────────────────── */
  html += `
  <div class="ph">
    <div class="ph-l">
      <div class="ph-title">FURNACE CHARGE CALCULATOR</div>
      <div class="ph-sub">${tl} &nbsp;|&nbsp; ${D.grade_description} (${D.grade_code}) &nbsp;|&nbsp; ${D.total_tonnes} t &nbsp;|&nbsp; Pour: ${D.heat_info.pour_temp||''} °C</div>
    </div>
    <div class="ph-r">
      <div class="mrow"><span class="mlbl">Date:</span><span class="mval">${hi.melt_date||''}</span></div>
      <div class="mrow"><span class="mlbl">Heat No.:</span><span class="mval">${hi.heat_no||''}</span></div>
      <div class="mrow"><span class="mlbl">Furnace:</span><span class="mval">${hi.furnace_no||''}</span></div>
    </div>
  </div>`;

  /* ── INFO BAR ───────────────────────────────────── */
  html += `
  <div class="ibar">
    <div class="ic"><div class="ic-l">Metal Grade</div><div class="ic-v"><strong>${D.grade_description}</strong></div></div>
    <div class="ic"><div class="ic-l">Grade Code</div><div class="ic-v">${D.grade_code}</div></div>
    <div class="ic"><div class="ic-l">Total Tap Wt.</div><div class="ic-v"><strong>${D.tap_weight.toLocaleString()} kg</strong></div></div>
    <div class="ic"><div class="ic-l">Pour Temp.</div><div class="ic-v"><strong>${hi.pour_temp||''} °C</strong>${hi.argon_purging ? ' <span style="background:#dbeafe;color:#1d4ed8;font-size:6pt;font-weight:700;padding:1px 4px;border-radius:3px">ARGON</span>':''}</div></div>
    <div class="ic"><div class="ic-l">Tap Temp.</div><div class="ic-v">${tapFromPour(hi.pour_temp)} °C</div></div>
    <div class="ic"><div class="ic-l">Operator</div><div class="ic-v">${hi.operator||''}</div></div>
  </div>`;

  /* ── PER-TAP BAR (double/triple only) ───────────── */
  if (D.n_taps > 1 && sp.length > 0) {
    html += `<div class="tapbar t${D.n_taps}">`;
    sp.forEach((s, i) => {
      const pTemp = hi.argon_purging ? s.temp + 30 : s.temp;
      html += `
        <div class="tbc"><div class="tbl">Tap ${i+1} Weight</div><div><strong>${s.weight} kg</strong></div></div>
        <div class="tbc"><div class="tbl">Tap ${i+1} Pour Temp.</div><div><strong>${pTemp} °C</strong>${hi.argon_purging ? ' <span style=\'background:#dbeafe;color:#1d4ed8;font-size:6pt;font-weight:700;padding:1px 4px;border-radius:3px\'>ARGON</span>':''}</div></div>
        <div class="tbc"><div class="tbl">Tap ${i+1} Tap Temp.</div><div>${tapFromPour(pTemp)} °C</div></div>`;
    });
    html += `</div>`;
  }

  /* ── CHEMISTRY ──────────────────────────────────── */
  html += `
  <div class="chem-wrap">
    <div class="stitle">Chemistry</div>
    <table class="ctbl">
      <thead><tr>
        <th class="lh">Element</th>
        ${CHEM.map(e=>`<th>${e}</th>`).join('')}
      </tr></thead>
      <tbody>
        <tr>
          <td class="lh">Aim %</td>
          ${CHEM.map(e=>{ const v=D.aim_chemistry[e]||0; return `<td>${fmtC(v)}</td>`; }).join('')}
        </tr>
        <tr>
          <td class="lh">Planned %</td>
          ${CHEM.map(e=>{
            const v=D.planned_chemistry[e]||0;
            const c=D.comparison[e]||{};
            const cls = c.aim>0 ? (c.status==='ok'?'ok':c.status==='low'?'low':'high') : '';
            return `<td class="${cls}">${fmtC(v)}</td>`;
          }).join('')}
        </tr>
        <tr>
          <td class="lh" style="color:#bbb;font-weight:400">Spectro Actual %</td>
          ${CHEM.map(()=>`<td style="color:#ccc">____</td>`).join('')}
        </tr>
      </tbody>
    </table>
  </div>`;

  /* ── TWO COLUMNS ────────────────────────────────── */
  html += `<div class="cols">`;

  /* LEFT: charge + alloy tables */
  html += `<div>`;

  /* Base charge */
  html += `
  <div class="tbox">
    <div class="stitle">Base Charge Materials (kg)</div>
    <table class="gtbl">
      <thead><tr><th>Material</th><th class="r">Planned</th><th class="r">Actual</th><th class="r">Total</th></tr></thead>
      <tbody>`;
  if (!D.charge_rows.length) {
    html += `<tr><td colspan="4" style="color:#aaa;font-style:italic;padding:5px">No materials entered</td></tr>`;
  } else {
    D.charge_rows.forEach(r => {
      html += `<tr><td>${r.description}</td><td class="r">${r.planned.toFixed(1)}</td><td class="r"></td><td class="r">${r.total.toFixed(1)}</td></tr>`;
    });
  }
  html += `
      </tbody>
      <tfoot>
        <tr class="sub"><td>Total Base Charge</td><td class="r">${D.total_charge_kg.toFixed(1)}</td><td class="r"></td><td class="r">${D.total_charge_kg.toFixed(1)}</td></tr>
      </tfoot>
    </table>
  </div>`;

  /* Alloy additions */
  html += `
  <div class="tbox">
    <div class="stitle">Alloy Additions (kg)</div>
    <table class="gtbl">
      <thead><tr><th>Addition</th><th class="r">Planned</th><th class="r">Trim</th><th class="r">Total</th></tr></thead>
      <tbody>`;
  if (!D.alloy_additions.length) {
    html += `<tr><td colspan="4" style="color:#aaa;font-style:italic;padding:5px">None required</td></tr>`;
  } else {
    D.alloy_additions.forEach(a => {
      html += `<tr><td>${a.description}</td><td class="r">${a.planned.toFixed(2)}</td><td class="r">${a.trim.toFixed(2)}</td><td class="r">${a.total.toFixed(2)}</td></tr>`;
    });
  }
  html += `
      </tbody>
      <tfoot>
        <tr class="sub"><td>Total Alloy Additions</td><td class="r">${D.total_add_kg.toFixed(2)}</td><td class="r"></td><td class="r">${D.total_add_kg.toFixed(2)}</td></tr>
        <tr class="gttl"><td colspan="3">TOTAL CHARGE (Base + Additions)</td><td class="r">${D.total_combined_kg.toFixed(2)} kg</td></tr>
      </tfoot>
    </table>
  </div>`;

  html += `</div>`; /* end left col */

  /* RIGHT: operator / times / actuals */
  html += `<div>`;

  html += `
  <div class="ops-box">
    <div class="stitle">Furnace Operator</div>
    <div class="ogrid">
      <div class="oc"><div class="ol">Operator</div><div class="ov">${hi.operator||''}</div></div>
      <div class="oc"><div class="ol">Date</div><div class="ov">${hi.melt_date||''}</div></div>
      <div class="oc"><div class="ol">Power On (Start)</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">am / pm</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">Power Off (Tap)</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">am / pm</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">START kW</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">END kW</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">Tap Finish Time</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">am / pm</div><div class="ov"></div></div>
    </div>
  </div>`;

  html += `
  <div class="ops-box">
    <div class="stitle">Actuals (fill after tap)</div>
    <div class="ogrid">
      <div class="oc"><div class="ol">Actual Tap Temp. (°C)</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">Actual Tap Weight (kg)</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">Pigged (kg)</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">Earth Fault</div><div class="ov"></div></div>
      <div class="oc full"><div class="ol">Total Charge Planned (kg)</div><div class="ov"><strong>${D.total_combined_kg.toFixed(2)}</strong></div></div>
    </div>
  </div>`;

  /* Per-tap actuals for multi-tap */
  if (D.n_taps > 1 && sp.length) {
    html += `<div class="ops-box"><div class="stitle">Per-Tap Actuals</div><div class="ogrid">`;
    sp.forEach((s,i) => {
      html += `
        <div class="oc"><div class="ol">Tap ${i+1} Actual Wt. (kg)</div><div class="ov"></div></div>
        <div class="oc"><div class="ol">Tap ${i+1} Actual Temp. (°C)</div><div class="ov"></div></div>`;
    });
    html += `</div></div>`;
  }

  html += `
  <div class="ops-box">
    <div class="stitle">Furnace Details</div>
    <div class="ogrid">
      <div class="oc"><div class="ol">Furnace Diam.</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">Start Temp.</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">Ladle Used</div><div class="ov">${hi.ladle||''}</div></div>
      <div class="oc"><div class="ol">Melt Weight (kg)</div><div class="ov">${D.total_charge_kg.toFixed(1)}</div></div>
    </div>
  </div>`;

  html += `</div>`; /* end right col */
  html += `</div>`; /* end .cols */

  /* ── LADLE / DEOX — FULL WIDTH BELOW TWO COLUMNS ── */
  if (D.ladle_additions && D.ladle_additions.length > 0) {
    html += `
    <div class="ladle-section">
      <div class="stitle">Deoxidation &amp; Ladle Additions${D.n_taps > 1 ? ' — Per Tap' : ' (kg)'}</div>`;

    if (D.n_taps === 1) {
      /* Single tap — simple full-width table */
      html += `
      <table class="ltbl">
        <thead><tr>
          <th>Additive</th><th>FA Code</th><th>Location</th>
          <th class="r">Rate (kg/t)</th><th class="r">Qty (kg)</th><th class="r">Actual (kg)</th>
        </tr></thead>
        <tbody>`;
      D.ladle_additions.forEach(a => {
        const locCls = a.location === 'furnace' ? 'loc-f' : 'loc-l';
        html += `<tr>
          <td>${a.name}</td>
          <td style="color:#555">${a.fa_code}</td>
          <td><span class="${locCls}">${a.location.toUpperCase()}</span></td>
          <td class="r">${a.rate_kg_per_tonne.toFixed(3)}</td>
          <td class="r"><strong>${a.kg.toFixed(3)}</strong></td>
          <td class="r"></td>
        </tr>`;
      });
      html += `</tbody></table>`;

    } else {
      /* Multi-tap — side-by-side boxes, one per tap */
      html += `<div class="ladle-grid t${D.n_taps}">`;
      sp.forEach((s, i) => {
        const tonne = s.weight / 1000;
        html += `
        <div class="ladle-tap-box">
          <div class="ladle-tap-hdr">Tap ${i+1} — ${s.weight.toLocaleString()} kg @ Pour: ${hi.argon_purging ? s.temp+30 : s.temp} °C &nbsp;|&nbsp; Ladle: ${s.ladle}</div>
          <table class="ltbl">
            <thead><tr>
              <th>Additive</th><th>Loc.</th>
              <th class="r">kg/t</th><th class="r">Qty (kg)</th><th class="r">Actual</th>
            </tr></thead>
            <tbody>`;
        D.ladle_additions.forEach(a => {
          const qty = (a.rate_kg_per_tonne * tonne).toFixed(3);
          const locCls = a.location === 'furnace' ? 'loc-f' : 'loc-l';
          html += `<tr>
            <td>${a.name}</td>
            <td><span class="${locCls}">${a.location.slice(0,4).toUpperCase()}</span></td>
            <td class="r">${a.rate_kg_per_tonne.toFixed(3)}</td>
            <td class="r"><strong>${qty}</strong></td>
            <td class="r"></td>
          </tr>`;
        });
        html += `</tbody></table></div>`;
      });
      html += `</div>`;
    }
    html += `</div>`; /* end ladle-section */
  }

  /* ── FORMER / INOCULANT ──────────────────────────── */
  html += `
  <div class="tbox">
    <div class="stitle">Inoculant / Former Notes</div>
    <div class="fgrid">
      <div class="fc">FM1365 - 2.5 T Part Former</div>
      <div class="fc">FM1345 - 2.5 T Full Former</div>
      <div class="fc">FM 1575 - 4 T Full Former</div>
      <div class="fc">FM 1570 - 4 T Part Former</div>
      <div class="fc full">A45682 - KELLUNDITE 857 &nbsp;&nbsp; A45682 - FOSECO KELLUNOITE 857</div>
    </div>
  </div>`;

  /* ── FOOTER ──────────────────────────────────────── */
  const ts = new Date().toLocaleString();
  html += `
  <div class="pfooter">
    <span>Furnace Charge Calculator — ${ts}</span>
    <span>Heat: ${hi.heat_no||'—'} | ${D.grade_code} ${D.grade_description} | ${tl}</span>
  </div>`;

  html += `</div>`; /* end .page */
  document.getElementById('pages').innerHTML = html;
}

/* ── Trim report render (called when D.report_type === 'trim') ── */
function renderTrim() {
  const hi  = D.heat_info || {};
  const CHEM = ['C','Si','Mn','Cr','Ni','Mo','Cu','P'];
  let html = `<div class="page">`;

  /* Header */
  html += `
  <div class="ph">
    <div class="ph-l">
      <div class="ph-title">TRIM CORRECTION REPORT</div>
      <div class="ph-sub">${D.grade_description} (${D.grade_code}) &nbsp;|&nbsp; Furnace wt: ${D.furnace_kg} kg</div>
    </div>
    <div class="ph-r">
      <div class="mrow"><span class="mlbl">Date:</span><span class="mval">${hi.melt_date||''}</span></div>
      <div class="mrow"><span class="mlbl">Heat No.:</span><span class="mval">${hi.heat_no||''}</span></div>
      <div class="mrow"><span class="mlbl">Furnace:</span><span class="mval">${hi.furnace_no||''}</span></div>
    </div>
  </div>`;

  /* Info bar */
  html += `
  <div class="ibar">
    <div class="ic"><div class="ic-l">Grade</div><div class="ic-v"><strong>${D.grade_description}</strong></div></div>
    <div class="ic"><div class="ic-l">Code</div><div class="ic-v">${D.grade_code}</div></div>
    <div class="ic"><div class="ic-l">Furnace Wt</div><div class="ic-v"><strong>${D.furnace_kg} kg</strong></div></div>
    <div class="ic"><div class="ic-l">Pour Temp.</div><div class="ic-v">${hi.pour_temp||''} °C</div></div>
    <div class="ic"><div class="ic-l">Operator</div><div class="ic-v">${hi.operator||''}</div></div>
    <div class="ic"><div class="ic-l">Ladle</div><div class="ic-v">${hi.ladle||''}</div></div>
  </div>`;

  /* Spectro vs Aim */
  html += `
  <div class="chem-wrap">
    <div class="stitle">Spectro Actuals vs Aim Chemistry (%)</div>
    <table class="ctbl">
      <thead><tr>
        <th class="lh">Element</th>
        ${CHEM.map(e => '<th>' + e + '</th>').join('')}
      </tr></thead>
      <tbody>
        <tr><td class="lh">Aim %</td>${CHEM.map(e => {
          const v = (D.aim_chemistry||{})[e]||0;
          return '<td>' + (v ? v.toFixed(3) : '—') + '</td>';
        }).join('')}</tr>
        <tr><td class="lh">Spectro %</td>${CHEM.map(e => {
          const s = (D.spectro||{})[e]||0;
          const a = (D.aim_chemistry||{})[e]||0;
          const cls = a > 0 ? (s > a + 0.005 ? 'high' : s < a - 0.005 ? 'low' : 'ok') : '';
          return '<td class="' + cls + '">' + (s||'—') + '</td>';
        }).join('')}</tr>
        <tr><td class="lh">Projected %</td>${CHEM.map(e => {
          const v = (D.projected_pct||{})[e]||0;
          const c = (D.comparison||{})[e]||{};
          const cls = c.aim > 0 ? (c.status==='ok'?'ok':c.status==='low'?'low':'high') : '';
          return '<td class="' + cls + '">' + (v ? v.toFixed(3) : '—') + '</td>';
        }).join('')}</tr>
      </tbody>
    </table>
  </div>`;

  /* Trim additions needed */
  html += `
  <div class="tbox">
    <div class="stitle">Trim Additions Required</div>
    <table class="gtbl">
      <thead><tr>
        <th>Element</th>
        <th class="r">Aim (%)</th><th class="r">Actual (%)</th><th class="r">Deficit (%)</th>
        <th>Addition</th><th class="r">Qty (kg)</th><th class="r">Cost ($)</th>
      </tr></thead>
      <tbody>`;
  if (!D.trim_needed || !D.trim_needed.length) {
    html += '<tr><td colspan="7" style="text-align:center;color:#0e7a52;font-weight:600;padding:10px">✓ No trim additions required — composition within aim</td></tr>';
  } else {
    D.trim_needed.forEach(t => {
      html += '<tr>'
        + '<td><strong>' + t.element + '</strong></td>'
        + '<td class="r">' + (t.aim||0).toFixed(3) + '</td>'
        + '<td class="r">' + (t.actual||0).toFixed(3) + '</td>'
        + '<td class="r" style="color:#92580a">' + (t.deficit||0).toFixed(3) + '</td>'
        + '<td>' + (t.addition_desc||t.addition_code||'') + '</td>'
        + '<td class="r"><strong>' + (t.addition_kg||0).toFixed(2) + ' kg</strong></td>'
        + '<td class="r">$' + (t.cost||0).toFixed(2) + '</td>'
        + '</tr>';
    });
    const totalKg   = (D.trim_needed||[]).reduce((s,t) => s+(t.addition_kg||0), 0);
    const totalCost = (D.trim_needed||[]).reduce((s,t) => s+(t.cost||0), 0);
    html += '<tr class="sub"><td colspan="5" style="text-align:right">Total</td>'
      + '<td class="r"><strong>' + totalKg.toFixed(2) + ' kg</strong></td>'
      + '<td class="r">$' + totalCost.toFixed(2) + '</td></tr>';
  }
  html += '</tbody></table></div>';

  /* Ladle additions */
  if (D.ladle_additions && D.ladle_additions.length) {
    html += '<div class="ladle-section"><div class="stitle">Ladle / Deoxidation Additions</div>'
      + '<table class="ltbl"><thead><tr>'
      + '<th>Additive</th><th>FA Code</th><th>Location</th><th class="r">kg/t</th><th class="r">Qty (kg)</th>'
      + '</tr></thead><tbody>';
    D.ladle_additions.forEach(a => {
      const cls = a.location === 'furnace' ? 'loc-f' : 'loc-l';
      html += '<tr><td>' + a.name + '</td><td>' + a.fa_code + '</td>'
        + '<td><span class="' + cls + '">' + a.location.toUpperCase() + '</span></td>'
        + '<td class="r">' + (a.rate_kg_per_tonne||0).toFixed(3) + '</td>'
        + '<td class="r"><strong>' + (a.kg||0).toFixed(3) + '</strong></td></tr>';
    });
    html += '</tbody></table></div>';
  }

  /* Ops section */
  html += `
  <div class="ops-box">
    <div class="stitle">Post-Trim Actuals</div>
    <div class="ogrid">
      <div class="oc"><div class="ol">Actual Pour Temp. (°C)</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">Actual Furnace Wt (kg)</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">Spectro Confirmed</div><div class="ov"></div></div>
      <div class="oc"><div class="ol">Operator Sign-off</div><div class="ov"></div></div>
    </div>
  </div>`;

  /* Footer */
  const ts = new Date().toLocaleString();
  html += '<div class="pfooter">'
    + '<span>Trim Correction Report — ' + ts + '</span>'
    + '<span>Heat: ' + (hi.heat_no||'—') + ' | ' + D.grade_code + ' ' + D.grade_description + '</span>'
    + '</div>';
  html += '</div>';
  document.getElementById('pages').innerHTML = html;
}
</script>
</body>
</html>
